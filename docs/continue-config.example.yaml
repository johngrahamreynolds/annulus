name: Annulus Local
version: 0.0.2
schema: v1

models:
  - name: Annulus Local
    provider: openai
    model: local
    apiBase: http://localhost:8080/v1
    apiKey: dev-local-key
    roles:
      - chat
      - edit
      - apply

  - name: Annulus Frontier
    provider: openai
    model: frontier
    apiBase: http://localhost:8080/v1
    apiKey: dev-local-key
    roles:
      - chat

# Run `annulus index` before chatting for retrieval-augmented answers.
# Non-streaming requests (or CLI --no-stream) enable the full tool loop and frontier escalation.
# Frontier: configure OPENAI_API_KEY and OPENAI_BASE_URL in .env (LiteLLM ZDR, OpenAI, etc.).
