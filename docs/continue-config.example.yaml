name: Annulus Local
version: 0.0.2
schema: v1

models:
  - name: Annulus Local
    provider: openai
    model: local
    apiBase: http://localhost:8080/v1
    apiKey: dev-local-key
    roles:
      - chat
      - edit
      - apply

  - name: Annulus Local Large
    provider: openai
    model: local-large
    apiBase: http://localhost:8080/v1
    apiKey: dev-local-key
    roles:
      - chat

  - name: Annulus GPT-OSS
    provider: openai
    model: gpt-oss
    apiBase: http://localhost:8080/v1
    apiKey: dev-local-key
    roles:
      - chat

  - name: Annulus Frontier
    provider: openai
    model: frontier
    apiBase: http://localhost:8080/v1
    apiKey: dev-local-key
    roles:
      - chat

# Index the workspace before chatting (`annulus index --rebuild` once, then incremental
# `annulus index` or `annulus index watch`). After upgrading Annulus, run --rebuild once.
# Profile names (local, local-large, gpt-oss, frontier) map to config/models.yaml.
# Streaming requests use the full tool loop when the profile has supports_tools: true.
# Gemma4 / gpt-oss profiles set expose_reasoning: true so Continue shows Thought UI
# (delta.reasoning_content) instead of mixing reasoning into the main chat stream.
# Use CLI --no-stream to print annulus metadata (iterations, tool_calls, escalation) inline.
#
# Continue: disable built-in tools (Tool Policies) so Annulus runs server-side tools.
# Continue may inject text saying tools are unavailable; Annulus appends <annulus_tools>
# to the system message to override that. Do not add custom rules denying tool use.
# Frontier: configure OPENAI_API_KEY and OPENAI_BASE_URL in .env (LiteLLM ZDR, OpenAI, etc.).
