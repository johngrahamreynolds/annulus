name: Annulus Local
version: 0.0.2
schema: v1

models:
  - name: Annulus Local
    provider: openai
    model: local
    apiBase: http://localhost:8080/v1
    apiKey: dev-local-key
    roles:
      - chat
      - edit
      - apply

  - name: Annulus Frontier
    provider: openai
    model: frontier
    apiBase: http://localhost:8080/v1
    apiKey: dev-local-key
    roles:
      - chat

# Run `annulus index` before chatting for retrieval-augmented answers.
# Streaming requests use the full tool loop when the model profile has supports_tools: true.
# Use CLI --no-stream to print annulus metadata (iterations, tool_calls, escalation) inline.
# Frontier: configure OPENAI_API_KEY and OPENAI_BASE_URL in .env (LiteLLM ZDR, OpenAI, etc.).
