[project]
name = "annulus-retrieval"
version = "0.3.0"
description = "Annulus code and docs retrieval index"
requires-python = ">=3.12"
dependencies = ["annulus-core"]

[tool.uv.sources]
annulus-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/annulus_retrieval"]

[tool.hatch.build.targets.wheel.sources]
"src/annulus_retrieval" = "annulus_retrieval"

[project.scripts]
annulus-index-worker = "annulus_retrieval.worker:main"
