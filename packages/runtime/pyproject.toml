[project]
name = "annulus-runtime"
version = "0.3.0"
description = "Annulus agent runtime — retrieval, tools, and model loop"
requires-python = ">=3.12"
dependencies = [
    "annulus-core",
    "annulus-router",
    "annulus-retrieval",
    "annulus-tools",
    "annulus-trace",
]

[tool.uv.sources]
annulus-core = { workspace = true }
annulus-router = { workspace = true }
annulus-retrieval = { workspace = true }
annulus-tools = { workspace = true }
annulus-trace = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/annulus_runtime"]

[tool.hatch.build.targets.wheel.sources]
"src/annulus_runtime" = "annulus_runtime"
