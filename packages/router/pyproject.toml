[project]
name = "annulus-router"
version = "0.1.0"
description = "Annulus model router — Ollama and frontier providers"
requires-python = ">=3.12"
dependencies = [
    "annulus-core",
    "httpx>=0.27",
]

[tool.uv.sources]
annulus-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/annulus_router"]

[tool.hatch.build.targets.wheel.sources]
"src/annulus_router" = "annulus_router"
