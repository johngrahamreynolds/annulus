[project]
name = "annulus-core"
version = "0.1.0"
description = "Annulus core types, configuration, and shared utilities"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/annulus_core"]

[tool.hatch.build.targets.wheel.sources]
"src/annulus_core" = "annulus_core"
