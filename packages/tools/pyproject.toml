[project]
name = "annulus-tools"
version = "0.3.0"
description = "Annulus built-in tools for agent loop"
requires-python = ">=3.12"
dependencies = ["annulus-core"]

[tool.uv.sources]
annulus-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/annulus_tools"]

[tool.hatch.build.targets.wheel.sources]
"src/annulus_tools" = "annulus_tools"
