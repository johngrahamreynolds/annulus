services:
  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    volumes:
      - ..:/workspace:cached
      - uv-cache:/root/.cache/uv
    command: sleep infinity
    env_file:
      - ../.env
    environment:
      OLLAMA_HOST: "http://host.docker.internal:11434"
      ANNULUS_CONFIG_DIR: "/workspace/config"
      ANNULUS_DATA_DIR: "/workspace/.annulus"
      ANNULUS_WORKSPACE_ROOT: "/workspace"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${ANNULUS_PORT:-8080}:8080"

volumes:
  uv-cache:
