profiles:
  local:
  # override default local model with gemma4:12b
    provider: ollama
    model: gemma4:12b
    description: Gemma4 12B; well-suited for reasoning, agentic workflows, coding, and multimodal understanding
    supports_tools: true
    expose_reasoning: true

  local-large:
    provider: ollama
    model: gemma4:26b
    description: Gemma4 26B; larger variant of gemma4:12b using a MoE architecture
    supports_tools: true
    expose_reasoning: true

  gpt-oss:
    provider: ollama
    model: gpt-oss:20b
    description: Reasoning model; experimental / opt-in for legacy comparison with Gemma
    supports_tools: true
    expose_reasoning: true
    # future: parallel_tool_calls: false

  local-coder:
    provider: ollama
    model: qwen2.5-coder:7b-instruct-q5_K_M
    description: Qwen coder — good for chat, emits tool JSON in content not tool_calls
    supports_tools: false

  frontier:
    provider: openai
    model: gpt-4o-mini
    description: Frontier model for escalation (requires OPENAI_API_KEY)
    supports_tools: true

defaults:
  chat: local

escalation:
  # Escalate to frontier when local profile fails or returns empty content
  on_local_error: true
  on_empty_response: true
  frontier_profile: frontier
