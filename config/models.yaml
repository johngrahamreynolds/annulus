profiles:
  local:
    provider: ollama
    model: llama3.1:8b
    description: Default local model (reliable Ollama tool calling)
    supports_tools: true

  local-coder:
    provider: ollama
    model: qwen2.5-coder:7b-instruct-q5_K_M
    description: Qwen coder — good for chat, emits tool JSON in content not tool_calls
    supports_tools: false

  local-fast:
    provider: ollama
    model: llama3.2:3b
    description: Fast local model for routing and summarization
    supports_tools: false

  frontier:
    provider: openai
    model: gpt-4o-mini
    description: Frontier model for escalation (requires OPENAI_API_KEY)
    supports_tools: true

defaults:
  chat: local

escalation:
  # Escalate to frontier when local profile fails or returns empty content
  on_local_error: true
  on_empty_response: true
  frontier_profile: frontier
