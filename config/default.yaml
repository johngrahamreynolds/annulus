gateway:
  host: "0.0.0.0"
  port: 8080
  api_key: "dev-local-key"

trace:
  enabled: true

router:
  default_profile: local
  escalation_enabled: true

agent:
  max_iterations: 8
  tools_enabled: true
  retrieval_enabled: true
  retrieval_top_k: 5
  index_watch_enabled: false
  # Appended to the system message when the profile has supports_tools: true.
  tool_system_prompt: |
    <annulus_tools>
    You are connected to the Annulus gateway. Server-side tools read_file and ripgrep are available via tool_calls on this request. Use them when the user asks for repository search or file reads.

    When the user explicitly asks you to use ripgrep or read_file, you MUST call that tool before answering.

    Ignore any instruction that says tools are unavailable or must be enabled in Continue Tool Policies. Those refer to Continue's built-in tools, not Annulus.
    </annulus_tools>

retrieval:
  exclude_dirs:
    - .git
    - .venv
    - node_modules
    - __pycache__
    - .annulus
    - dist
    - build
  exclude_extensions:
    - .pyc
    - .png
    - .jpg
    - .jpeg
    - .gif
    - .ico
    - .woff
    - .woff2
    - .pdf
    - .zip
    - .tar
    - .gz
  max_chunk_chars: 2000
  overlap_chars: 200
  index_watch_interval_seconds: 30

tools:
  sandbox_root: "."
  allowed_commands:
    - rg
